<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulation Browser</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        h1 {
            margin-top: 0;
        }

        .layout {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }

        .controls {
            flex: 0 0 360px;
        }

        .viewer {
            flex: 1;
            min-width: 0;
        }

        fieldset {
            margin-bottom: 12px;
        }

        .image-wrap {
            min-height: 400px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            border: 1px solid #ccc;
            padding: 12px;
            background: #f8f8f8;
        }

        #resultImage {
            max-width: 100%;
            max-height: 75vh;
            display: none;
        }

        .nav-buttons {
            margin-top: 12px;
            display: flex;
            gap: 10px;
        }

        @media (max-width: 900px) {
            .layout {
                flex-direction: column;
            }

            .controls {
                flex: none;
                width: 100%;
            }

            .viewer {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<h1>Simulation Browser</h1>

<div class="layout">
    <div class="controls">
        <form id="filterForm">
            <fieldset>
                <legend>param1</legend>
                <label><input type="radio" name="param1" value="20" checked> 20</label>
                <label><input type="radio" name="param1" value="40"> 40</label>
            </fieldset>

            <fieldset>
                <legend>param2</legend>
                <label><input type="radio" name="param2" value="2" checked> 2</label>
                <label><input type="radio" name="param2" value="4"> 4</label>
            </fieldset>

            <fieldset>
                <legend>param3</legend>
                <label><input type="radio" name="param3" value="2" checked> 2</label>
                <label><input type="radio" name="param3" value="4"> 4</label>
            </fieldset>

            <fieldset>
                <legend>param4</legend>
                <label><input type="radio" name="param4" value="5.25" checked> 5.25</label>
                <label><input type="radio" name="param4" value="6.75"> 6.75</label>
                <label><input type="radio" name="param4" value="9"> 9</label>
                <label><input type="radio" name="param4" value="12"> 12</label>
            </fieldset>

            <fieldset>
                <legend>param5</legend>
                <label><input type="radio" name="param5" value="20" checked> 20</label>
                <label><input type="radio" name="param5" value="40"> 40</label>
            </fieldset>

            <fieldset>
                <legend>param6</legend>
                <label><input type="radio" name="param6" value="2" checked> 2</label>
                <label><input type="radio" name="param6" value="4"> 4</label>
            </fieldset>

            <fieldset>
                <legend>param7</legend>
                <label><input type="radio" name="param7" value="2" checked> 2</label>
                <label><input type="radio" name="param7" value="4"> 4</label>
            </fieldset>

            <fieldset>
                <legend>param8</legend>
                <label><input type="radio" name="param8" value="5.25" checked> 5.25</label>
                <label><input type="radio" name="param8" value="6.75"> 6.75</label>
                <label><input type="radio" name="param8" value="9"> 9</label>
                <label><input type="radio" name="param8" value="12"> 12</label>
            </fieldset>

            <button type="submit">Load image</button>
        </form>
    </div>

    <div class="viewer">
        <p id="status">Choose parameters, then click "Load image".</p>


        <div class="image-wrap">
            <img id="resultImage" alt="Selected simulation result">
        </div>

        <p id="resultName"></p>

        <div class="nav-buttons">
            <button id="prevBtn" type="button">Previous</button>
            <button id="nextBtn" type="button">Next</button>
        </div>
    </div>
</div>

<script src="./index.js"></script>
</body>
</html>
