<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulation Browser</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        h1 {
            margin-top: 0;
        }

        .layout {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }

        .controls {
            flex: 0 0 360px;
        }

        .viewer {
            flex: 1;
            min-width: 0;
        }

        fieldset {
            margin-bottom: 12px;
        }

        .image-wrap {
            min-height: 400px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            border: 1px solid #ccc;
            padding: 12px;
            background: #f8f8f8;
        }

        #resultImage {
            max-width: 100%;
            max-height: 75vh;
            display: none;
        }

        .nav-buttons {
            margin-top: 12px;
            display: flex;
            gap: 10px;
        }

        @media (max-width: 900px) {
            .layout {
                flex-direction: column;
            }

            .controls {
                flex: none;
                width: 100%;
            }

            .viewer {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<h1>Simulation Browser</h1>

<div class="layout">
    <div class="controls">
        <form id="filterForm">
            <fieldset>
                <legend>wtDR</legend>
                <label><input type="radio" name="wtDR" value="20" checked> 20</label>
                <label><input type="radio" name="wtDR" value="40"> 40</label>
            </fieldset>

            <fieldset>
                <legend>wtCID</legend>
                <label><input type="radio" name="wtCID" value="2" checked> 2</label>
                <label><input type="radio" name="wtCID" value="4"> 4</label>
            </fieldset>

            <fieldset>
                <legend>wtCIL</legend>
                <label><input type="radio" name="wtCIL" value="2" checked> 2</label>
                <label><input type="radio" name="wtCIL" value="4"> 4</label>
            </fieldset>

            <fieldset>
                <legend>wtMR</legend>
                <label><input type="radio" name="wtMR" value="5.25" checked> 5.25</label>
                <label><input type="radio" name="wtMR" value="6.75"> 6.75</label>
                <label><input type="radio" name="wtMR" value="9"> 9</label>
                <label><input type="radio" name="wtMR" value="12"> 12</label>
            </fieldset>

            <fieldset>
                <legend>mDR</legend>
                <label><input type="radio" name="mDR" value="20" checked> 20</label>
                <label><input type="radio" name="mDR" value="40"> 40</label>
            </fieldset>

            <fieldset>
                <legend>mCID</legend>
                <label><input type="radio" name="mCID" value="2" checked> 2</label>
                <label><input type="radio" name="mCID" value="4"> 4</label>
            </fieldset>

            <fieldset>
                <legend>mCIL</legend>
                <label><input type="radio" name="mCIL" value="2" checked> 2</label>
                <label><input type="radio" name="mCIL" value="4"> 4</label>
            </fieldset>

            <fieldset>
                <legend>mMR</legend>
                <label><input type="radio" name="mMR" value="5.25" checked> 5.25</label>
                <label><input type="radio" name="mMR" value="6.75"> 6.75</label>
                <label><input type="radio" name="mMR" value="9"> 9</label>
                <label><input type="radio" name="mMR" value="12"> 12</label>
            </fieldset>

            <button type="submit">Load image</button>
        </form>
    </div>

    <div class="viewer">
        <p id="status">Choose parameters, then click "Load image".</p>


        <div class="image-wrap">
            <img id="resultImage" alt="Selected simulation result">
        </div>

        <p id="resultName"></p>

        <div class="nav-buttons">
            <button id="prevBtn" type="button">Previous</button>
            <button id="nextBtn" type="button">Next</button>
        </div>
    </div>
</div>

<script src="./index.js"></script>
</body>
</html>
